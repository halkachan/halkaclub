<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="HALKAのゲーム「かがみねちゃれんじ」。" />
    <title>かがみねちゃれんじ | HALKA</title>
    <link rel="icon" href="/favicon.png?v=2" type="image/png" />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="game.css" />
  </head>
  <body>
    <main id="top">
      <div class="yellow-tape" aria-hidden="true">
        <span>HALKA GAME</span>
        <span>tap to launch ▶</span>
      </div>

      <div class="notebook">
        <header class="site-header">
          <a class="small-sign" href="../index.html">HALKA</a>
          <p>かがみねちゃれんじ</p>
          <span class="header-doodle" aria-hidden="true">遊　〰</span>
        </header>

        <section class="game-section" aria-labelledby="game-title">
          <div class="section-heading">
            <div>
              <p>game</p>
              <h1 id="game-title">かがみねちゃれんじ</h1>
            </div>
            <span aria-hidden="true">♪　・　☆</span>
          </div>

          <p class="game-orientation-note">📱 縦画面推奨</p>

          <div class="game-frame-wrap">
            <div class="game-frame" id="game-frame">
              <button class="game-launch-button" id="game-launch-button" type="button">
                <span>ゲームを起動</span>
                <span aria-hidden="true">▶</span>
              </button>
            </div>
          </div>

          <div class="game-newtab-wrap">
            <a class="game-newtab-button" href="https://halkachan.github.io/kagamine-challenge/" target="_blank" rel="noreferrer">
              <span>別タブで遊ぶ</span>
              <span aria-hidden="true">↗</span>
            </a>
          </div>

          <a class="back-link" href="../index.html">← リンク集へ戻る</a>
        </section>
      </div>
    </main>

    <script src="game.js" defer></script>
  </body>
</html>
